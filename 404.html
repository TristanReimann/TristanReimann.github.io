<!DOCTYPE html>
<html lang="en">
<!--
  404.html — shown automatically by GitHub Pages for URLs that
  don't exist. The filename is all GitHub looks for; no setup needed.
  Links here start with "/" (root-relative) because a 404 can happen
  at any URL depth.
-->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page not found — [Your Name]</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <main class="wrap">
    <header class="hero">
      <div class="hero-text">
        <p class="eyebrow">Error 404</p>
        <h1>Page not found</h1>
        <p>The page you're looking for doesn't exist or has moved.</p>
        <p><a href="/">Back to the homepage</a></p>
      </div>
    </header>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p>&copy; 2026 [Your Name]</p>
    </div>
  </footer>

</body>
</html>
