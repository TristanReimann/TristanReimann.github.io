<!DOCTYPE html>
<html lang="en">
<!--
  404.html — shown automatically by GitHub Pages when a visitor
  opens a URL that doesn't exist. No setup needed; the filename
  is all GitHub looks for.
-->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page not found — [Your Name]</title>
  <link rel="stylesheet" href="/css/style.css">
  <!-- Note: this link starts with "/" (root-relative) because a 404
       can happen at any URL depth, e.g. /some/deep/path -->
</head>
<body>

  <header class="site-header">
    <div class="wrap">
      <a class="site-name" href="/">[Your Name]</a>
    </div>
  </header>

  <main class="wrap">
    <section class="intro">
      <h1>Page not found</h1>
      <p>The page you're looking for doesn't exist or has moved.</p>
      <p><a href="/">Back to the homepage</a></p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p>&copy; 2026 [Your Name]</p>
    </div>
  </footer>

</body>
</html>
